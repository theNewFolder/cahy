# Font
font_family      DankMono Nerd Font
font_size        12
bold_font        auto
italic_font      auto
bold_italic_font auto

# Window
window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
copy_on_select clipboard

# Bell
enable_audio_bell no
visual_bell_duration 0

# Gruvbox Dark colors
background #1d2021
foreground #fbf1c7
cursor     #fbf1c7

selection_background  #504945
selection_foreground  #fbf1c7

# Normal
color0  #282828
color1  #d42020
color2  #a8b020
color3  #e8a50e
color4  #4f96c8
color5  #c8509b
color6  #70b060
color7  #d5c4a1

# Bright
color8  #504945
color9  #ff5050
color10 #d0f020
color11 #ffd040
color12 #60c0ff
color13 #ff60d0
color14 #60ff90
color15 #fbf1c7

# Tab bar
active_tab_background   #ffd040
active_tab_foreground   #1d2021
inactive_tab_background #3c3836
inactive_tab_foreground #bdae93
tab_bar_style           powerline
