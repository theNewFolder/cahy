general {
    hide_cursor = true
    grace = 3
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/canyon.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(ffd040)
    inner_color = rgb(1d2021)
    font_color = rgb(fbf1c7)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 16
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgb(fbf1c7)
    font_size = 64
    font_family = DankMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgb(d5c4a1)
    font_size = 20
    font_family = DankMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
