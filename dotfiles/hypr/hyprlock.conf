general {
    hide_cursor = true
    grace = 3
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    brightness = 0.4
    vibrancy = 0.2
    color = rgba(30, 30, 46, 1.0)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(137, 180, 250)
    inner_color = rgb(49, 50, 68)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 14
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgb(203, 166, 247)
    font_size = 72
    font_family = DankMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgb(166, 173, 200)
    font_size = 20
    font_family = DankMono Nerd Font
    position = 0, 65
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi, $USER
    color = rgb(137, 180, 250)
    font_size = 16
    font_family = DankMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}
