exec-once = dbus-update-activation-environment --systemd DISPLAY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target
$browser=firefox
$menu=wofi --show drun
$mod=SUPER
$term=foot
$term2=kitty
bezier=overshot, 0.05, 0.9, 0.1, 1.1
bezier=smooth, 0.5, 0, 0.99, 0.99
animation=windows, 1, 5, overshot, slide
animation=windowsOut, 1, 5, smooth, slide
animation=fade, 1, 4, smooth
animation=workspaces, 1, 4, overshot, slidevert
animation=border, 1, 10, default
animation=borderangle, 1, 8, default

bind=$mod, Return, exec, $term
bind=$mod SHIFT, Return, exec, $term2
bind=$mod, D, exec, $menu
bind=$mod, Space, exec, $menu
bind=$mod, Q, killactive,
bind=$mod, B, exec, $browser
bind=$mod, E, exec, emacsclient -c -a emacs
bind=$mod SHIFT, E, exec, $term -e emacsclient -t -a emacs
bind=$mod, T, exec, $term -e yazi
bind=$mod, M, exec, $term -e btop
bind=$mod, C, exec, emacsclient -c -e '(org-capture)'
bind=$mod, A, exec, emacsclient -c -e '(org-agenda)'
bind=$mod, N, exec, emacsclient -c -e '(org-roam-node-find)'
bind=$mod SHIFT, N, exec, emacsclient -c -e '(org-roam-dailies-capture-today)'
bind=$mod, H, movefocus, l
bind=$mod, J, movefocus, d
bind=$mod, K, movefocus, u
bind=$mod, L, movefocus, r
bind=$mod, Left, movefocus, l
bind=$mod, Down, movefocus, d
bind=$mod, Up, movefocus, u
bind=$mod, Right, movefocus, r
bind=$mod SHIFT, H, movewindow, l
bind=$mod SHIFT, J, movewindow, d
bind=$mod SHIFT, K, movewindow, u
bind=$mod SHIFT, L, movewindow, r
bind=$mod SHIFT, Left, movewindow, l
bind=$mod SHIFT, Down, movewindow, d
bind=$mod SHIFT, Up, movewindow, u
bind=$mod SHIFT, Right, movewindow, r
bind=$mod, 1, workspace, 1
bind=$mod, 2, workspace, 2
bind=$mod, 3, workspace, 3
bind=$mod, 4, workspace, 4
bind=$mod, 5, workspace, 5
bind=$mod, 6, workspace, 6
bind=$mod, 7, workspace, 7
bind=$mod, 8, workspace, 8
bind=$mod, 9, workspace, 9
bind=$mod SHIFT, 1, movetoworkspace, 1
bind=$mod SHIFT, 2, movetoworkspace, 2
bind=$mod SHIFT, 3, movetoworkspace, 3
bind=$mod SHIFT, 4, movetoworkspace, 4
bind=$mod SHIFT, 5, movetoworkspace, 5
bind=$mod SHIFT, 6, movetoworkspace, 6
bind=$mod SHIFT, 7, movetoworkspace, 7
bind=$mod SHIFT, 8, movetoworkspace, 8
bind=$mod SHIFT, 9, movetoworkspace, 9
bind=$mod, S, togglesplit,
bind=$mod, V, togglesplit,
bind=$mod, F, fullscreen, 0
bind=$mod SHIFT, Space, togglefloating,
bind=$mod SHIFT, P, pseudo,
bind=$mod SHIFT, C, exec, hyprctl reload
bind=$mod SHIFT, Minus, movetoworkspace, special:scratchpad
bind=$mod, Minus, togglespecialworkspace, scratchpad
bind=, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png
bind=$mod, Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png
bind=CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy
bind=$mod SHIFT, Print, exec, grim - | wl-copy
bind=, XF86AudioPlay, exec, playerctl play-pause
bind=, XF86AudioNext, exec, playerctl next
bind=, XF86AudioPrev, exec, playerctl previous
bind=$mod, P, exec, playerctl play-pause
bind=$mod CTRL, Escape, exec, hyprlock
bind=$mod SHIFT, Q, exec, ~/.local/bin/power-menu
bind=$mod, G, exec, foot -a floating -e lazygit
bind=$mod SHIFT, W, exec, wallpaper-rotate
bind=$mod, I, exec, foot -a floating -e gemini
bind=$mod SHIFT, I, exec, foot -a floating -e claude
bind=$mod SHIFT, B, exec, foot -a floating -e bluetui
bind=$mod SHIFT, M, exec, foot -a floating -e nmtui

binde=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde=$mod, Equal, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86MonBrightnessUp, exec, brightnessctl set 10%+
binde=, XF86MonBrightnessDown, exec, brightnessctl set 10%-
binde=$mod, BracketRight, exec, brightnessctl set 10%+
binde=$mod, BracketLeft, exec, brightnessctl set 10%-

bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindm=$mod, mouse:272, movewindow
bindm=$mod, mouse:273, resizewindow

decoration {
  blur {
    enabled=true
    new_optimizations=true
    passes=3
    size=5
    xray=false
  }

  shadow {
    color=rgba(0, 0, 0, 0.5)
    enabled=true
    offset=0 4
    range=20
    render_power=3
  }
  active_opacity=1.000000
  dim_inactive=true
  dim_strength=0.050000
  inactive_opacity=1.000000
  rounding=16
}

dwindle {
  force_split=2
  preserve_split=true
  pseudotile=true
}

env=LIBVA_DRIVER_NAME,nvidia
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
env=GBM_BACKEND,nvidia-drm
env=WLR_NO_HARDWARE_CURSORS,1
env=NIXOS_OZONE_WL,1
env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,Hyprland
env=XDG_SESSION_DESKTOP,Hyprland
env=QT_QPA_PLATFORM,wayland
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=MOZ_ENABLE_WAYLAND,1

exec-once=waybar
exec-once=mako
exec-once=wl-paste --watch cliphist store
exec-once=nm-applet --indicator
exec-once=hyprpolkitagent || /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || true
exec-once=wlsunset -l 25 -L 55
exec-once=hyprpaper
exec-once=hypridle

general {
  allow_tearing=false
  border_size=3
  col.active_border=rgb(ffd040) rgb(60ff90) 45deg
  col.inactive_border=rgb(504945)
  gaps_in=10
  gaps_out=0
  layout=dwindle
}

input {
  touchpad {
    natural_scroll=true
    scroll_factor=1.000000
    tap-to-click=true
  }
  accel_profile=flat
  follow_mouse=1
  kb_layout=us
  repeat_delay=300
  repeat_rate=50
  sensitivity=0
}

layerrule=blur, waybar
layerrule=blur, wofi
layerrule=ignorealpha 0.3, waybar
layerrule=ignorealpha 0.3, wofi

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  force_default_wallpaper=0
  key_press_enables_dpms=true
  mouse_move_enables_dpms=true
  vrr=1
}

monitor=, preferred, auto, 1

windowrulev2=workspace 2, class:^(firefox)$
windowrulev2=workspace 2, class:^(chromium)$
windowrulev2=workspace 1, class:^(emacs)$
windowrulev2=workspace 1, class:^(Emacs)$
windowrulev2=workspace 3, class:^(discord)$
windowrulev2=workspace 3, class:^(slack)$
windowrulev2=workspace 4, class:^(mpv)$
windowrulev2=float, class:^(floating)$
windowrulev2=size 1200 800, class:^(floating)$
windowrulev2=float, class:^(pavucontrol)$
windowrulev2=float, class:^(bluetuith)$
windowrulev2=float, title:^(Picture-in-Picture)$
windowrulev2=pin, title:^(Picture-in-Picture)$
windowrulev2=float, class:^(.*)$, title:^(Open File)$
windowrulev2=float, class:^(.*)$, title:^(Save As)$
windowrulev2=opacity 0.95, class:^(foot)$
windowrulev2=opacity 0.95, class:^(kitty)$
