bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = $mod, P, exec, playerctl play-pause
bind = $mod CTRL, Escape, exec, hyprlock
bind = $mod SHIFT, Q, exec, ~/.local/bin/power-menu
bind = $mod, G, exec, foot -a floating -e lazygit
bind = $mod SHIFT, G, exec, ~/.local/bin/guix-menu
