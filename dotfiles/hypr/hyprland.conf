bind = $mod, Minus, togglespecialworkspace, scratchpad
# Screenshots — save to file + clipboard
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png && wl-copy < ~/Pictures/Screenshots/$(ls -t ~/Pictures/Screenshots/ | head -1)
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim -g "$(slurp)" - | swappy -f -
