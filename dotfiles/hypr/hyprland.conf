# ── Variables ──
$browser = firefox
$menu = wofi --show drun
$mod = SUPER
$term = footclient || foot
$term2 = kitty

# ── Monitor ──
monitor = , preferred, auto, 1

# ── Environment ──
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct

# ── Autostart ──
exec-once = dbus-update-activation-environment --systemd DISPLAY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target
exec-once = waybar
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = nm-applet --indicator
exec-once = hyprpolkitagent || /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || true
exec-once = wlsunset -l 25 -L 55
exec-once = hyprpaper
exec-once = hypridle

# ── Input ──
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    repeat_delay = 300
    repeat_rate = 50
    touchpad {
        natural_scroll = true
        tap-to-click = true
        scroll_factor = 1.0
    }
}

# ── General ──
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(89b4fa) rgb(cba6f7) 45deg
    col.inactive_border = rgb(585b70)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration (Catppuccin Mocha) ──
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        popups = true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1e1e2eee)
        color_inactive = rgba(1e1e2e80)
    }
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.08
}

# ── Animations (smooth + subtle) ──
animations {
    enabled = yes
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 4, smooth, slide
    animation = windowsIn, 1, 4, smoothIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 4, smooth
    animation = border, 1, 6, smooth
    animation = borderangle, 1, 60, liner, loop
    animation = fade, 1, 4, smooth
    animation = fadeDim, 1, 4, smooth
    animation = workspaces, 1, 4, smooth, slide
    animation = specialWorkspace, 1, 4, smooth, slidefadevert 15%
    animation = layers, 1, 3, smooth, slide
    animation = layersIn, 1, 3, smoothIn, slide
    animation = layersOut, 1, 2, smoothOut
}

cursor {
    no_hardware_cursors = true
}

render {
    direct_scanout = false
}

xwayland {
    force_zero_scaling = true
}

dwindle { pseudotile = true; preserve_split = true; force_split = 2 }

group {
    col.border_active = rgb(ffd040)
    col.border_inactive = rgb(504945)
    groupbar {
        font_family = DankMono Nerd Font
        font_size = 12
        height = 20
        col.active = rgb(ffd040)
        col.inactive = rgb(3c3836)
        text_color = rgb(1d2021)
        gradients = true
        render_titles = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vfr = true
}

layerrule = blur, waybar
layerrule = blur, wofi
layerrule = blur, notifications
layerrule = ignorealpha 0.3, waybar
layerrule = ignorealpha 0.3, wofi
layerrule = ignorealpha 0.3, notifications

windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(chromium)$
windowrulev2 = workspace 2, class:^(google-chrome)$
windowrulev2 = workspace 1, class:^(emacs)$
windowrulev2 = workspace 1, class:^(Emacs)$
windowrulev2 = workspace 3, class:^(foot)$
windowrulev2 = workspace 3, class:^(kitty)$
windowrulev2 = workspace 3, class:^(discord)$
windowrulev2 = workspace 3, class:^(slack)$
windowrulev2 = workspace 4, class:^(mpv)$
windowrulev2 = float, class:^(floating)$
windowrulev2 = size 1200 800, class:^(floating)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(bluetuith)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(.*)$, title:^(Open File)$
windowrulev2 = float, class:^(.*)$, title:^(Save As)$
windowrulev2 = opacity 0.88 0.82, class:^(foot)$
windowrulev2 = opacity 0.88 0.82, class:^(kitty)$
windowrulev2 = animation slide, class:^(wofi)$
windowrulev2 = animation popin 80%, class:^(floating)$
windowrulev2 = animation popin 80%, class:^(pavucontrol)$
windowrulev2 = animation popin 80%, title:^(Picture-in-Picture)$
windowrulev2 = dimaround, class:^(pavucontrol)$
windowrulev2 = dimaround, class:^(bluetuith)$
windowrulev2 = animation popin 80%, class:^(bluetuith)$
windowrulev2 = animation popin 60%, title:^(Open File)$
windowrulev2 = animation popin 60%, title:^(Save As)$
windowrulev2 = dimaround, title:^(Open File)$
windowrulev2 = dimaround, title:^(Save As)$

