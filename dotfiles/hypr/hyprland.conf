bind = $mod, A, exec, emacsclient -c -e '(org-agenda)'
bind = $mod, N, exec, emacsclient -c -e '(org-roam-node-find)'
bind = $mod SHIFT, N, exec, emacsclient -c -e '(org-roam-dailies-capture-today)'
bind = $mod SHIFT, M, exec, emacsclient -c -e '(mu4e)' -a emacs
